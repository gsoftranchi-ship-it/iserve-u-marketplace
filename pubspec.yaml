name: iserve_u
description: "A new Flutter project."

publish_to: 'none'


version: 1.0.0+1

environment:
  sdk: ^3.10.0


dependencies:
  flutter:
    sdk: flutter

  flutter_web_plugins:
    sdk: flutter

  cupertino_icons: ^1.0.8
  package_info_plus: ^8.0.2
  # FIREBASE
  firebase_core: ^3.15.2
  cloud_firestore: ^5.6.12
  firebase_storage: ^12.4.10
  firebase_auth: ^5.6.1
  firebase_messaging: ^15.2.7
  flutter_local_notifications: ^19.2.1

  # STATE MANAGEMENT
  provider: ^6.1.5+1

  # VIDEO ENGINE
  video_player: ^2.8.6

  # WINDOWS VIDEO ENGINE
  media_kit: ^1.1.11
  media_kit_video: ^1.2.5
  media_kit_libs_windows_video: ^1.0.11
  media_kit_libs_android_video: ^1.3.7
  video_player_media_kit: ^1.0.5


  # CACHE + STORAGE
  flutter_cache_manager: ^3.4.1
  path_provider: ^2.1.3
  path: ^1.9.0

  # NETWORK
  http: ^1.2.1
  connectivity_plus: ^6.0.3

  # DEVICE
  device_info_plus: ^10.1.0

  # UTILITIES
  uuid: ^4.4.0
  intl: ^0.19.0

  # UI
  fl_chart: ^0.70.0
  qr_flutter: ^4.1.0
  mobile_scanner: ^5.1.0
  url_launcher: ^6.3.2

  # IMAGE
  image_picker: ^1.0.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: ^0.14.3
  flutter_lints: ^6.0.0

flutter_launcher_icons:
    android: true
    ios: true

    image_path: "assets/images/logo.png"


    web:
      generate: true
      image_path: "assets/images/logo.png"

    windows:
      generate: true
      image_path: "assets/images/logo.png"

flutter:

  uses-material-design: true

  assets:
    - assets/images/logo.png
    - assets/images/hero.png
    - assets/images/food.png
    - assets/images/iserveu_default.png
    - assets/images/hero_mobile.png
